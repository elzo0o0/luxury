<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>Cart</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <div class="logo">Luxury</div>

        <nav class="icons-nav">
          <a href="index.html" title="Catalog" data-test-id="menu-shop">🏠</a>
          <a href="cart.html" title="Cart" data-test-id="menu-cart"
            >🛒 <span id="cart-count" data-test-id="cart-badge"></span
          ></a>
          <a href="profile.html" title="Profile" data-test-id="menu-profile"
            >👤</a
          >
          <a href="history.html" title="History" data-test-id="menu-history"
            >📦</a
          >
        </nav>
      </div>

      <div class="header-right">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
          />
          <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <button id="themeBtn" data-test-id="theme-toggle">🌙</button>
      </div>
    </header>

    <div id="cartList" class="cart-container" data-test-id="cart-list"></div>
    <div
      id="cartEmpty"
      class="hidden"
      data-test-id="cart-empty"
      style="padding: 24px"
    >
      Cart is empty
    </div>
    <div class="cart-container">
      <div id="cartList"></div>
      <div id="cartFooter"></div>
    </div>
    <div
      id="removeModal"
      class="modal hidden"
      data-test-id="remove-confirm-modal"
    >
      <div class="modal-box">
        <p>Remove item from cart?</p>
        <button id="confirmRemove">Yes</button>
        <button id="cancelRemove">No</button>
      </div>
    </div>

    <div id="notification" class="notification hidden"></div>

    <script src="js/common.js" defer></script>
    <script src="js/cart.js" defer></script>
  </body>
</html>
