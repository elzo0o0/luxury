<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <title>History</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header-left">
        <div class="logo">Luxury</div>

        <nav class="icons-nav">
          <a href="index.html" title="Catalog" data-test-id="menu-shop">🏠</a>
          <a href="cart.html" title="Cart" data-test-id="menu-cart"
            >🛒 <span id="cart-count" data-test-id="cart-badge"></span
          ></a>
          <a href="profile.html" title="Profile" data-test-id="menu-profile"
            >👤</a
          >
          <a href="history.html" title="History" data-test-id="menu-history"
            >📦</a
          >
        </nav>
      </div>

      <div class="header-right">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search products..."
          />
          <div id="suggestions" class="suggestions hidden"></div>
        </div>

        <button id="themeBtn" data-test-id="theme-toggle">🌙</button>
      </div>
    </header>

    <div id="ordersEmpty" class="cart-empty" data-test-id="orders-empty">
      Order history is empty
    </div>
    <div id="historyList" data-test-id="orders-list"></div>

    <script src="js/common.js" defer></script>
    <script src="js/history.js" defer></script>
  </body>
</html>
